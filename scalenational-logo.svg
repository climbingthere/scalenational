<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- A with upward arrow inside -->
  <g transform="translate(250, 80)">
    <!-- Left side of A -->
    <path d="M 0 200 L 80 0 L 160 200" stroke="#0d4a3f" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Middle bar of A -->
    <line x1="40" y1="120" x2="120" y2="120" stroke="#0d4a3f" stroke-width="18" stroke-linecap="round"/>
    <!-- Upward arrow inside -->
    <path d="M 80 160 L 80 80" stroke="#2fb896" stroke-width="16" stroke-linecap="round"/>
    <path d="M 80 80 L 60 100" stroke="#2fb896" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 80 80 L 100 100" stroke="#2fb896" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#0d4a3f" text-anchor="middle">
    SCALENATIONAL
  </text>
</svg>