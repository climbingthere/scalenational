<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contractor Onboarding — Scale National</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="intake">

  <!-- Header -->
  <div class="header">
    <div class="logo">Scale National</div>
    <div class="header-subtitle">Contractor Onboarding</div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-steps">
      <div class="line-fill" style="width:0%"></div>
      <div class="step active">
        <div class="step-circle">1</div>
        <div class="step-label">Information</div>
      </div>
      <div class="step">
        <div class="step-circle">2</div>
        <div class="step-label">Agreement</div>
      </div>
      <div class="step">
        <div class="step-circle">3</div>
        <div class="step-label">Complete</div>
      </div>
    </div>
  </div>

  <!-- Form -->
  <div class="container">
    <form id="intakeForm" novalidate>

      <!-- Business Information -->
      <div class="form-section">
        <h2>Business Information</h2>

        <div class="field">
          <label>Business Legal Name <span class="req">*</span></label>
          <input type="text" name="businessName" required>
          <div class="error-msg"></div>
        </div>

        <div class="field">
          <label>Owner Full Name <span class="req">*</span></label>
          <input type="text" name="ownerName" required>
          <div class="error-msg"></div>
        </div>

        <div class="row row-2">
          <div class="field">
            <label>Business Phone <span class="req">*</span></label>
            <input type="tel" name="phone" required placeholder="(555) 555-5555">
            <div class="error-msg"></div>
          </div>
          <div class="field">
            <label>Business Email <span class="req">*</span></label>
            <input type="email" name="email" required>
            <div class="error-msg"></div>
          </div>
        </div>

        <div class="field">
          <label>Business Address <span class="req">*</span></label>
          <input type="text" name="address" required>
          <div class="error-msg"></div>
        </div>

        <div class="row row-3">
          <div class="field">
            <label>City <span class="req">*</span></label>
            <input type="text" name="city" required>
            <div class="error-msg"></div>
          </div>
          <div class="field">
            <label>State <span class="req">*</span></label>
            <input type="text" name="state" required>
            <div class="error-msg"></div>
          </div>
          <div class="field">
            <label>Zip <span class="req">*</span></label>
            <input type="text" name="zip" required>
            <div class="error-msg"></div>
          </div>
        </div>

        <div class="row row-2">
          <div class="field">
            <label>Years in Business</label>
            <input type="number" name="yearsInBusiness" min="0" max="100">
          </div>
          <div class="field">
            <label>Number of Employees</label>
            <select name="employees">
              <option value="">Select...</option>
              <option value="1-5">1-5</option>
              <option value="6-15">6-15</option>
              <option value="16-30">16-30</option>
              <option value="30+">30+</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Services Offered -->
      <div class="form-section">
        <h2>Services Offered</h2>
        <div class="checkbox-grid">
          <label class="checkbox-item">
            <input type="checkbox" name="services" value="Roofing">
            <span>Roofing</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="services" value="HVAC">
            <span>HVAC</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="services" value="Plumbing">
            <span>Plumbing</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="services" value="Electrical">
            <span>Electrical</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="services" value="Landscaping">
            <span>Landscaping</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="services" value="General Contracting">
            <span>General Contracting</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="services" value="Other" id="service-other">
            <span>Other</span>
          </label>
        </div>
        <div class="other-field">
          <div class="field" style="margin-top:0">
            <label>Please specify</label>
            <input type="text" name="servicesOther">
          </div>
        </div>
      </div>

      <!-- Service Areas -->
      <div class="form-section">
        <h2>Service Areas</h2>

        <div class="field">
          <label>Primary Service Area / City</label>
          <input type="text" name="primaryArea">
        </div>

        <div class="field">
          <label>Additional Service Areas</label>
          <textarea name="additionalAreas" placeholder="List all cities/towns you service"></textarea>
        </div>

        <div class="field">
          <label>Service Radius in Miles</label>
          <select name="serviceRadius">
            <option value="">Select...</option>
            <option value="10">10 miles</option>
            <option value="25">25 miles</option>
            <option value="50">50 miles</option>
            <option value="100+">100+ miles</option>
          </select>
        </div>
      </div>

      <!-- Online Presence -->
      <div class="form-section">
        <h2>Online Presence</h2>

        <div class="field">
          <label>Current Website URL</label>
          <input type="url" name="website" placeholder="https://">
        </div>

        <div class="field">
          <label>Google Business Profile URL</label>
          <input type="url" name="googleProfile" placeholder="https://">
        </div>

        <div class="row row-2">
          <div class="field">
            <label>Facebook Page URL</label>
            <input type="url" name="facebook" placeholder="https://">
          </div>
          <div class="field">
            <label>Instagram Handle</label>
            <input type="text" name="instagram" placeholder="@handle">
          </div>
        </div>

        <div class="row row-2">
          <div class="field">
            <label>Current Google Rating</label>
            <select name="googleRating">
              <option value="">Select...</option>
              <option value="No reviews yet">No reviews yet</option>
              <option value="Below 3.5">Below 3.5</option>
              <option value="3.5-4.0">3.5 - 4.0</option>
              <option value="4.0-4.5">4.0 - 4.5</option>
              <option value="4.5+">4.5+</option>
            </select>
          </div>
          <div class="field">
            <label>Approx. Past Clients / Jobs</label>
            <select name="pastClients">
              <option value="">Select...</option>
              <option value="Under 50">Under 50</option>
              <option value="50-200">50 - 200</option>
              <option value="200-500">200 - 500</option>
              <option value="500+">500+</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Package Selection -->
      <div class="form-section">
        <h2>Select Your Package</h2>
        <div class="package-grid">

          <label class="package-card">
            <input type="radio" name="package" value="starter" required>
            <div class="package-name">Starter</div>
            <div class="package-price">$297/mo</div>
            <div class="package-desc">Website + Review Automation + Missed Call Text Back</div>
          </label>

          <label class="package-card">
            <input type="radio" name="package" value="growth" required>
            <div class="package-name">Growth <span class="badge">Recommended</span></div>
            <div class="package-price">$397/mo</div>
            <div class="package-desc">Everything in Starter + CRM + Lead Pipeline + Client Dashboard</div>
          </label>

          <label class="package-card">
            <input type="radio" name="package" value="scale" required>
            <div class="package-name">Scale</div>
            <div class="package-price">$597/mo</div>
            <div class="package-desc">Everything in Growth + Ads Management + Monthly Reporting + Priority Support</div>
          </label>

        </div>
        <div class="error-msg" style="margin-top:8px"></div>
      </div>

      <!-- Goals & Notes -->
      <div class="form-section">
        <h2>Goals &amp; Notes</h2>

        <div class="field">
          <label>What's your #1 goal in the next 90 days?</label>
          <textarea name="goal90" placeholder="e.g. Get more 5-star reviews, generate more leads..."></textarea>
        </div>

        <div class="field">
          <label>Anything else we should know?</label>
          <textarea name="notes" placeholder="Optional"></textarea>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary">Continue to Contract &rarr;</button>

    </form>
  </div>

  <div class="footer">&copy; 2026 Scale National. All rights reserved.</div>

  <script src="js/main.js"></script>
</body>
</html>
